<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Carte de visite 360°</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        model-viewer {
            width: 90vw;
            height: 90vh;
        }
    </style>
</head>
<body>
    <model-viewer src="carte.glb"
                  auto-rotate
                  camera-controls
                  shadow-intensity="1"
                  exposure="1.1">
    </model-viewer>
</body>
</html>
