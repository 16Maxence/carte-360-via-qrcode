<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Carte de visite 360°</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <style>
        body {
            margin: 0;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            position: relative;
            width: 90vw;
            height: 90vh;
        }

        model-viewer {
            width: 100%;
            height: 100%;
        }

        /* Bouton cliquable */
        .qr-link {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #005bbb;
            color: white;
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 16px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .qr-link:hover {
            background: #004999;
        }
    </style>
</head>

<body>
    <div class="container">
        <model-viewer src="carte.glb"
                      auto-rotate
                      camera-controls
                      shadow-intensity="1"
                      exposure="1.1">
        </model-viewer>

        <!-- Lien cliquable -->
        <a class="qr-link" href="https://www.iadfrance.fr/conseiller-immobilier/xabi.davril" target="_blank">
            Accéder au profil IAD
        </a>
    </div>
</body>
</html>
